<div class="container">
    <nav class="nav" (click)="logout()">
        <p-avatar
            pRipple
            icon="pi pi-sign-out"
            [style]="{backgroundColor: 'var(--accent-color)'}"/>
    </nav>
    @if (isMobile()){
    <nav class="nav" (click)="sidebarVisible = true">
        <p-avatar
            pRipple
            icon="pi pi-bars"
            [style]="{backgroundColor: 'var(--primary-color)'}"/>
    </nav>
    }
</div>

<p-sidebar [(visible)]="sidebarVisible" [style]="{'width': '40vw'}" class="primary-side">
    <app-side-menu/>
</p-sidebar>
