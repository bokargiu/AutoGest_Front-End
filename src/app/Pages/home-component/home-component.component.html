<app-header/>
<div class="content">
    <section class="hero">
        <div class="hero-text">
            <h1>
                Conheça seu Novo Saas de Gerenciamento para Autônomos!
            </h1>
        </div>

        <div class="hero-img">
            <div class="img-container">
                <img src="assets/Images/UserHomePage.png"/>
            </div>
        </div>
    </section>
    <section class="functions">
        <div *ngFor="let card of cardsFunctions" class="central-card">
            <div pRipple class="card-functions">
                <img [src]="card.img">
                <div>
                    <h2>{{card.title}}</h2>
                    <p>{{card.txt}}</p>
                </div>
            </div>
        </div>
    </section>
</div>
<app-footer/>
