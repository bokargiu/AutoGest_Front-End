<div class="container">
  
    <div class="date-selector">
      <p-button (click)="op.toggle($event)" size="small">
        <h3>{{getFormatedTitle()}}</h3>
      </p-button>
    </div>

  <div class="calendar-container">
    <div class="calendar">
      <mwl-calendar-month-view
        [viewDate]="viewDate"
        [events]="events"
        [locale]="'pt-BR'"
        [activeDayIsOpen]="activeDayIsOpen"
        (dayClicked)="dayClicked($event.day)"
        (eventClicked)="eventClicked($event)"
        [cellTemplate]="customCellTemplate">
        <ng-template #customCellTemplate let-day="day">
          <div class="cal-cell-top">
            @if(day.inMonth){
              @if (day.badgeTotal > 0) {
                <span class="cal-day-badge" style="background-color: var(--secondary-color);">{{ day.badgeTotal }}</span>
              }
              <span class="cal-day-number">{{day.date.getDate()}}</span>
            }
            @else {
              <div style="width: 100%; height: 100%; background-color: rgba(135, 116, 116, 0.066);"></div>
            }
          </div>
        </ng-template>
      </mwl-calendar-month-view>
    </div>
  </div>

  <div class="options">
      <!-- Novo agendamento -->
      <nav>
        <p-avatar
          pRipple
          size="large"
          [style]="{ backgroundColor: 'var(--secondary-color)', color: '#fff'}"
          icon="pi pi-calendar-plus"
          class="secondary hov-p"
          (click)="newScheduleDialog()">
        </p-avatar>
      </nav>

      <!-- Editar agendamento -->
      <nav>
        <p-avatar
          pRipple
          size="large"
          [style]="{ backgroundColor: 'var(--primary-color)', border: '1px solid black'}"
          icon="pi pi-pencil"
          class="primary-b hov-p"
          (click)="openEditSchedule()">
        </p-avatar>
      </nav>

      <!-- Cancelar/Excluir agendamento -->
      <nav>
        <p-avatar
          pRipple
          size="large"
          [style]="{ backgroundColor: 'var(--accent-color)'}"
          icon="pi pi-calendar-times"
          class="tertiary-black hov-p"
          (click)="openDeleteSchedule()">
        </p-avatar>
      </nav>
    
  </div>

  <div class="agenda">
    <mwl-calendar-week-view
      #wk
      [viewDate]="viewDate"
      [events]="events"
      [locale]="'pt-BR'"
      [hourSegments]="1"
      [dayStartHour]="0"
      [dayEndHour]="24"
      (eventClicked)="eventClicked($event)">
  <ng-template #eventTemplate let-event="event">
    <div
      [class.disabled-event]="event.start.getMonth() !== viewDate.getMonth()">
      {{ event.title }}
    </div>
  </ng-template>

    </mwl-calendar-week-view>
  </div>
</div>

<p-overlayPanel
  #op
  [dismissable]="true">
  <p-calendar
    [(ngModel)]="viewDate"
    inline="true"
    view="month"
    dateFormat="mm/yy"
    (onSelect)="op.toggle($event)"
    (onSelect)="loadOrders()"/>
</p-overlayPanel>

<!-- Novo Agendamento -->
<p-dialog
  header="Novo Agendamento"
  [(visible)]="scheduleV"
  [modal]="true"
  [closable]="false"
  [style]="{ width: '25vw', height: '60vh'}"
  [breakpoints]="{ '800px': '90vw', '1024px': '65vw' }">

  <ng-template pTemplate="content">
    <div class="field">
      <!-- Cliente -->
      <p-dropdown
        [options]="clients"
        optionLabel="name"
        optionValue="id"
        appendTo="body"
        [(ngModel)]="scheduleDTO.clientId"
        placeholder="Selecione o cliente">
      </p-dropdown>

      <!-- Data e hora -->
      <p-calendar
        styleClass="calendar-Input"
        [(ngModel)]="scheduleDTO.start"
        [showTime]="true"
        appendTo="body"
        hourFormat="24"
        dateFormat="dd/mm/yy"
        placeholder="Data e hora">
      </p-calendar>

      <!-- Serviços -->
      <p-multiSelect
        [options]="services"
        appendTo="body"
        optionLabel="title"
        optionValue="id"
        [maxSelectedLabels]="1"
        selectedItemsLabel="{0} selecionado(s)"
        [(ngModel)]="selectedServices"
        defaultLabel="Selecione os serviços"/>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="btns">
      <p-button
        severity="success"
        class="secondary"
        label="Confirmar"
        size="small"
        (onClick)="createSchedule()">
      </p-button>

      <p-button
        severity="secondary"
        class="tertiary"
        label="Cancelar"
        size="small"
        (onClick)="newScheduleDialog()">
      </p-button>
    </div>
  </ng-template>
</p-dialog>

<!-- Editar Agendamento -->
<p-dialog

  [closable]="false"
  [style]="{ width: '25vw', height: '60vh'}"
  [breakpoints]="{ '800px': '90vw', '1024px': '65vw' }">

  <ng-template pTemplate="content">
    <div class="field">
      <!-- Cliente -->

        optionLabel="name"
        optionValue="id"
        appendTo="body"
        [(ngModel)]="schedule.client.id"
        placeholder="Selecione o cliente">
      </p-dropdown>

      <!-- Data e hora -->
      <p-calendar
        styleClass="calendar-Input"
        [(ngModel)]="startEdit"
        [showTime]="true"
        appendTo="body"
        hourFormat="24"
        dateFormat="dd/mm/yy"
        placeholder="Data e hora">
      </p-calendar>

      <!-- Serviços -->
      <p-multiSelect
        [options]="services"
        appendTo="body"
        optionLabel="title"
        optionValue="id"
        [maxSelectedLabels]="1"
        selectedItemsLabel="{0} selecionado(s)"
        [(ngModel)]="selectedServices"
        defaultLabel="Selecione os serviços"/>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="btns">
      <p-button
        severity="success"
        class="secondary"
        label="Confirmar"
        size="small"
        (onClick)="updateSchedule()">
      </p-button>

      <p-button
        severity="secondary"

        size="small"

      </p-button>
    </div>
  </ng-template>
</p-dialog>

<!-- Excluir Agendamento -->
<p-dialog
  header="Excluir Agendamento"
  [(visible)]="delleteScheduleV"
  [modal]="true"
  [closable]="false"
  [style]="{ width: '25vw', height: '60vh'}"
  [breakpoints]="{ '800px': '90vw', '1024px': '65vw' }">

  <ng-template pTemplate="content">
    <div class="field">
      <!-- Cliente -->
      <p-dropdown
        [options]="clients"
        optionLabel="name"
        optionValue="id"
        appendTo="body"
        [disabled]="true"
        [(ngModel)]="schedule.client.id"
        placeholder="Selecione o cliente">
      </p-dropdown>

      <!-- Data e hora -->
      <p-calendar
        styleClass="calendar-Input"
        [(ngModel)]="startEdit"
        [showTime]="true"
        appendTo="body"
        [disabled]="true"
        hourFormat="24"
        dateFormat="dd/mm/yy"
        placeholder="Data e hora">
      </p-calendar>

      <!-- Serviços -->
      <p-multiSelect
        [options]="services"
        appendTo="body"
        optionLabel="title"
        optionValue="id"
        [maxSelectedLabels]="1"
        selectedItemsLabel="{0} selecionado(s)"
        [(ngModel)]="selectedServices"
        [disabled]="true"
        defaultLabel="Selecione os serviços"/>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="btns">
      <p-button
        severity="success"
        label="Confirmar"
        size="small"
        (onClick)="deleteSchedule()">
      </p-button>

      <p-button
        severity="secondary"
        label="Cancelar"
        size="small"
        (onClick)="closeDeleteSchedule()">
      </p-button>
    </div>
  </ng-template>
</p-dialog>
