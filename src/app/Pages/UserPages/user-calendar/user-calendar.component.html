<div class="container">
    <div class="calendar-container">
        <div class="calendar">
            <mwl-calendar-month-view
                [viewDate]="viewDate"
                [events]="events"
                />
        </div>
    </div>
    <div class="options">
        <nav>
            <p-avatar
            pRipple
            size="large"
            icon="pi pi-calendar-plus"
            class="secondary hov-p"/>
        </nav>
        <nav>
            <p-avatar
            pRipple
            size="large"
            icon="pi pi-pencil"
            class="primary-b hov-p"/>
        </nav>
        <nav>
            <p-avatar
            pRipple
            size="large"
            icon="pi pi-calendar-times"
            class="tertiary-black hov-p"/>
        </nav>
    </div>
    <div class="agenda">
        <mwl-calendar-week-view
            [viewDate]="viewDate"
            [events]="events"
            [locale]="'pt-BR'"
            [hourSegments]="1"
            [dayStartHour]="4"
            [dayEndHour]="22"
            />
    </div>
</div>
